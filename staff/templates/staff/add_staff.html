{% extends "staff/base.html" %}

{% block title %}
    Add Staff
{% endblock %}

{% block navigation %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a
            href="{% url 'home' %}"
            class="btn btn-secondary">
            Home
        </a>
        <div>
            <a
                href="{% url 'staff_list' %}"
                class="btn btn-primary me-2">
                View Staff
            </a>
        </div>
    </div>
{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">
                Add Staff
            </h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">
                        Name
                    </label>
                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Email
                    </label>
                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Phone
                    </label>
                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Department
                    </label>
                    <input
                        type="text"
                        name="department"
                        class="form-control"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Designation
                    </label>
                    <input
                        type="text"
                        name="designation"
                        class="form-control"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Joining Date
                    </label>
                    <input
                        type="date"
                        name="joining_date"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Salary
                    </label>
                    <input
                        type="number"
                        name="salary"
                        class="form-control"
                        required>
                </div>

                <div class="text-center mt-4">
                    <button
                        type="submit"
                        class="btn btn-success px-4">
                        Save Staff
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
